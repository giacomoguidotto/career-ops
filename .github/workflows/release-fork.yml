name: Career System Release

on:
  push:
    branches: [fork/main]

concurrency:
  group: career-system-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Install test dependencies
        run: npm install --ignore-scripts
      - name: Validate Career System contract
        run: node --test tests/career-system-contract.test.mjs
      - name: Validate complete repository
        run: node test-all.mjs
      - name: Derive fork version
        id: version
        run: bash scripts/bump-fork-version.sh
      - name: Push tag
        if: steps.version.outputs.tag != ''
        run: git push origin "${{ steps.version.outputs.tag }}"
      - name: Publish immutable GitHub release
        if: steps.version.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists."
            exit 0
          fi
          gh release create "$tag" \
            --verify-tag \
            --title "$tag" \
            --generate-notes
